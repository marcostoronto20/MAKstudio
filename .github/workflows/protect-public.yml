name: Protect Public Folder

on: [push, pull_request]

jobs:
  check-public:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Block changes in public folder
        run: |
          if git diff --name-only HEAD~1 HEAD | grep '^public/'; then
            echo "Changes in /public are not allowed."
            exit 1
          fi
